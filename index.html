<!DOCTYPE html>
<html lang="en">
<head>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="by MINDGRID SYSTEMS.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KnowHub — Digital Knowledge Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0C1322; --ink-2:#111A2E; --ink-3:#18233C; --line:#26334F;
  --text:#E8ECF4; --muted:#94A3BF; --gold:#FB7185; --gold-soft:rgba(251,113,133,.13);
  --uae:#34D399; --world:#60A5FA; --tech:#C084FC; --econ:#F0B43C; --quiz:#F87171; --country:#2DD4BF;
  --radius:14px;
  --font-display:'Space Grotesk',system-ui,sans-serif;
  --font-body:'Inter',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--ink);color:var(--text);font-family:var(--font-body);font-size:15px;line-height:1.6;min-height:100vh}
button{font-family:inherit;cursor:pointer}
a{color:var(--gold)}
.topbar{position:sticky;top:0;z-index:50;background:rgba(12,19,34,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.topbar-inner{max-width:1180px;margin:0 auto;display:flex;align-items:center;gap:8px;padding:14px 20px;flex-wrap:wrap}
.logo{font-family:var(--font-display);font-weight:700;font-size:20px;letter-spacing:.5px;display:flex;align-items:center;gap:10px;white-space:nowrap}
.logo .dot{width:10px;height:10px;border-radius:3px;background:var(--gold);box-shadow:0 0 14px var(--gold)}
.brandline{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-right:auto;padding-left:4px}
.nav{display:flex;gap:4px;flex-wrap:wrap}
.nav button{background:none;border:1px solid transparent;color:var(--muted);padding:7px 13px;border-radius:9px;font-size:13.5px;font-weight:500;transition:.18s}
.nav button:hover{color:var(--text);background:var(--ink-3)}
.nav button.active{color:var(--ink);background:var(--gold);font-weight:600}
.nav button:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.ticker{border-bottom:1px solid var(--line);background:var(--ink-2);overflow:hidden;white-space:nowrap}
.ticker-track{display:inline-block;padding:8px 0;animation:tick 75s linear infinite;font-family:var(--font-mono);font-size:12.5px;color:var(--muted)}
.ticker-track b{color:var(--gold);font-weight:600}
.ticker:hover .ticker-track{animation-play-state:paused}
@keyframes tick{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@media (prefers-reduced-motion:reduce){.ticker-track{animation:none}}
.page{max-width:1180px;margin:0 auto;padding:34px 20px 80px;display:none}
.page.active{display:block;animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.eyebrow{font-family:var(--font-mono);font-size:11.5px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
h1{font-family:var(--font-display);font-size:clamp(28px,4.5vw,44px);font-weight:700;line-height:1.15;margin-bottom:12px}
h2{font-family:var(--font-display);font-size:21px;font-weight:600;margin:34px 0 14px}
.lede{color:var(--muted);max-width:640px;margin-bottom:26px}
.grid{display:grid;gap:16px}
.grid.cols-3{grid-template-columns:repeat(auto-fill,minmax(290px,1fr))}
.grid.cols-4{grid-template-columns:repeat(auto-fill,minmax(230px,1fr))}
.card{background:var(--ink-3);border:1px solid var(--line);border-radius:var(--radius);padding:20px;transition:.2s;position:relative;overflow:hidden}
.card:hover{transform:translateY(-3px);border-color:#3A4B70;box-shadow:0 10px 30px rgba(0,0,0,.35)}
.card .tag{display:inline-block;font-family:var(--font-mono);font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;border-radius:99px;margin-bottom:11px;font-weight:600}
.card h3{font-family:var(--font-display);font-size:16.5px;font-weight:600;line-height:1.35;margin-bottom:8px}
.card p{font-size:13.5px;color:var(--muted)}
.card .why{margin-top:12px;padding:10px 12px;background:var(--gold-soft);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;font-size:12.5px;color:#F3D2D9}
.card .why b{color:var(--gold)}
.card .src{margin-top:10px;font-family:var(--font-mono);font-size:11px;color:#5F7196}
.t-uae{background:rgba(52,211,153,.14);color:var(--uae)} .b-uae{border-top:3px solid var(--uae)}
.t-world{background:rgba(96,165,250,.14);color:var(--world)} .b-world{border-top:3px solid var(--world)}
.t-tech{background:rgba(192,132,252,.14);color:var(--tech)} .b-tech{border-top:3px solid var(--tech)}
.t-econ{background:rgba(240,180,60,.14);color:var(--econ)} .b-econ{border-top:3px solid var(--econ)}
.t-quiz{background:rgba(248,113,113,.14);color:var(--quiz)} .b-quiz{border-top:3px solid var(--quiz)}
.t-country{background:rgba(45,212,191,.14);color:var(--country)} .b-country{border-top:3px solid var(--country)}
.hub{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-top:28px}
.hub-tile{text-align:left;background:var(--ink-3);border:1px solid var(--line);border-radius:var(--radius);padding:24px;color:var(--text);transition:.2s}
.hub-tile:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.4)}
.hub-tile .ico{font-size:26px;margin-bottom:12px;display:block}
.hub-tile h3{font-family:var(--font-display);font-size:17px;margin-bottom:6px}
.hub-tile p{font-size:13px;color:var(--muted)}
.hub-tile .go{display:inline-block;margin-top:12px;font-family:var(--font-mono);font-size:11.5px;letter-spacing:1px;color:var(--gold)}
.fetchbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;background:var(--ink-2);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;margin-bottom:22px}
.fetchbar .info{font-size:12.5px;color:var(--muted);flex:1;min-width:200px}
.btn{background:var(--gold);color:var(--ink);border:none;padding:9px 18px;border-radius:9px;font-weight:600;font-size:13.5px;transition:.18s}
.btn:hover{filter:brightness(1.08)}
.btn:disabled{opacity:.5;cursor:wait}
.btn.ghost{background:var(--ink-3);color:var(--text);border:1px solid var(--line)}
.spinner{display:none;width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.status{font-family:var(--font-mono);font-size:11.5px;color:var(--muted)}
.cc{display:flex;flex-direction:column;gap:6px}
.cc .flag{font-size:34px;line-height:1}
.cc table{width:100%;font-size:12.5px;border-collapse:collapse;margin-top:4px}
.cc td{padding:3px 0;color:var(--muted);vertical-align:top}
.cc td:first-child{font-family:var(--font-mono);font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:#5F7196;width:88px}
.cc td:last-child{color:var(--text)}
.searchrow{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.searchrow input{flex:1;min-width:220px;background:var(--ink-3);border:1px solid var(--line);border-radius:9px;padding:10px 14px;color:var(--text);font-family:inherit;font-size:14px}
.searchrow input:focus{outline:2px solid var(--gold);border-color:transparent}
.brand{display:flex;gap:14px;align-items:flex-start}
.mono{flex:none;width:52px;height:52px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:21px;color:#fff}
.brand .tagline{font-style:italic;color:var(--text);font-size:13.5px;margin:3px 0 6px}
.brand .meta{font-family:var(--font-mono);font-size:11px;color:#5F7196}
.note{background:var(--ink-2);border:1px solid var(--line);border-radius:10px;padding:12px 16px;font-size:12.5px;color:var(--muted);margin-bottom:22px}
.flash{perspective:1000px;cursor:pointer;min-height:150px}
.flash-inner{position:relative;width:100%;height:100%;min-height:150px;transition:transform .5s;transform-style:preserve-3d}
.flash.flipped .flash-inner{transform:rotateY(180deg)}
.flash-face{position:absolute;inset:0;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;text-align:center;padding:22px;border-radius:var(--radius);border:1px solid var(--line)}
.flash-front{background:var(--ink-3);font-family:var(--font-display);font-size:15.5px;font-weight:600}
.flash-back{background:var(--gold-soft);border-color:rgba(251,113,133,.4);transform:rotateY(180deg);color:var(--gold);font-size:14.5px;font-weight:600}
.flash .hint{position:absolute;bottom:8px;right:12px;font-family:var(--font-mono);font-size:10px;color:#5F7196}
.qz{background:var(--ink-3);border:1px solid var(--line);border-radius:var(--radius);padding:26px;max-width:680px}
.qz .qno{font-family:var(--font-mono);font-size:11px;color:var(--gold);letter-spacing:1.5px;margin-bottom:10px}
.qz .qtext{font-family:var(--font-display);font-size:18px;font-weight:600;margin-bottom:18px}
.qz .opt{display:block;width:100%;text-align:left;background:var(--ink-2);border:1px solid var(--line);color:var(--text);padding:12px 16px;border-radius:10px;margin-bottom:9px;font-size:14px;transition:.15s}
.qz .opt:hover{border-color:var(--gold)}
.qz .opt.correct{background:rgba(52,211,153,.16);border-color:var(--uae);color:var(--uae)}
.qz .opt.wrong{background:rgba(248,113,113,.14);border-color:var(--quiz);color:var(--quiz)}
.qz .score{font-family:var(--font-mono);font-size:12px;color:var(--muted);margin-top:8px}
ul.tips{list-style:none}
ul.tips li{padding:10px 0 10px 26px;position:relative;border-bottom:1px solid var(--line);font-size:14px;color:var(--muted)}
ul.tips li b{color:var(--text)}
ul.tips li::before{content:"\25C6";position:absolute;left:2px;color:var(--gold);font-size:10px;top:14px}
.srcgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.srcgrid .card{padding:16px}
.srcgrid h3{font-size:14.5px}
/* ----- player bar / chips ----- */
.pbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;background:var(--ink-2);border:1px solid var(--line);border-radius:var(--radius);padding:12px 16px;margin-bottom:22px}
.pbar input{background:var(--ink-3);border:1px solid var(--line);border-radius:9px;padding:8px 12px;color:var(--text);font-family:inherit;font-size:13.5px;min-width:160px}
.pbar input:focus{outline:2px solid var(--gold);border-color:transparent}
.pbar .who{font-size:13px;color:var(--muted)}
.pbar .who b{color:var(--text)}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto}
.chip{font-family:var(--font-mono);font-size:11px;background:var(--ink-3);border:1px solid var(--line);border-radius:99px;padding:5px 11px;color:var(--muted)}
.chip b{color:var(--gold)}
/* ----- cram ----- */
.cram-top{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.filterbtn{font-size:12.5px;background:var(--ink-3);border:1px solid var(--line);color:var(--muted);padding:7px 13px;border-radius:99px;transition:.15s}
.filterbtn:hover{color:var(--text)}
.filterbtn.active{background:var(--gold);color:var(--ink);border-color:var(--gold);font-weight:600}
.cram-stage{background:var(--ink-3);border:1px solid var(--line);border-radius:var(--radius);padding:28px;max-width:720px;min-height:230px;display:flex;flex-direction:column}
.cram-bar{height:6px;background:var(--ink);border-radius:99px;overflow:hidden;margin-bottom:18px}
.cram-bar i{display:block;height:100%;background:var(--gold);transition:width .3s}
.cram-cat{font-family:var(--font-mono);font-size:11px;letter-spacing:1.5px;color:var(--gold);margin-bottom:10px}
.cram-q{font-family:var(--font-display);font-size:21px;font-weight:600;line-height:1.3}
.cram-a{margin-top:16px;padding-top:16px;border-top:1px dashed var(--line);font-size:15px;color:#F3D2D9;display:none}
.cram-a.show{display:block;animation:fade .25s}
.cram-ctl{display:flex;gap:10px;margin-top:22px;flex-wrap:wrap}
.cram-count{font-family:var(--font-mono);font-size:12px;color:var(--muted);margin-left:auto;align-self:center}
/* ----- leaderboard ----- */
.board{width:100%;border-collapse:collapse;font-size:13.5px;background:var(--ink-3);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.board th{font-family:var(--font-mono);font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:#5F7196;text-align:left;padding:12px 14px;border-bottom:1px solid var(--line)}
.board td{padding:11px 14px;border-bottom:1px solid var(--line);color:var(--text)}
.board tr:last-child td{border-bottom:none}
.board tr.me{background:var(--gold-soft)}
.board .rk{font-family:var(--font-mono);color:var(--gold);font-weight:600;width:46px}
.board .nm{font-weight:600}
.sorttabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.medal{font-size:15px}
.qotd-head{font-family:var(--font-mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
.qotd-done{margin-top:10px;padding:10px 14px;border-radius:10px;font-size:14px}
.qotd-done.good{background:rgba(52,211,153,.14);color:var(--uae)}
.qotd-done.bad{background:rgba(248,113,113,.12);color:var(--quiz)}
.qotd-home{background:linear-gradient(135deg,var(--ink-3),var(--ink-2));border:1px solid var(--line);border-left:4px solid var(--gold);border-radius:var(--radius);padding:18px 20px;margin-top:24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.qotd-home .q{flex:1;min-width:220px}
.qotd-home .lbl{font-family:var(--font-mono);font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.qotd-home .txt{font-family:var(--font-display);font-weight:600;font-size:15.5px}
footer{border-top:1px solid var(--line);padding:26px 20px;text-align:center;font-size:12.5px;color:#5F7196;font-family:var(--font-mono)}
@media(max-width:640px){.topbar-inner{padding:10px 14px}.nav button{padding:6px 9px;font-size:12px}.brandline{display:none}}
</style>
</head>

/* ================= QUESTION OF THE DAY ================= */
const PTS_QOTD = 15;
function dayStamp(d){ d=d||new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function qotdPick(){
  // deterministic per calendar day → same question for everyone that day
  const stamp=dayStamp();
  let h=0; for(let i=0;i<stamp.length;i++){ h=(h*31+stamp.charCodeAt(i))>>>0; }
  const base=GK_BANK[h % GK_BANK.length];
  // stable option order seeded by the day too
  const opts=[...base.opts].sort((a,b)=>(((h+a.length)%7)-((h+b.length)%7)));
  return {...base,opts};
}
function qotdDone(){ const s=storeLoad(); return s.qotd && s.qotd.date===dayStamp(); }
function renderQOTD(){
  const host=document.getElementById("qotd"); if(!host) return;
  const q=qotdPick();
  const s=storeLoad();
  const already=qotdDone();
  if(already){
    const wasRight=s.qotd.correct;
    host.innerHTML=`<div class="qotd-head">🗓️ Question of the Day · ${monthLabel(monthKey()).split(" ")[0]} ${new Date().getDate()}</div>
      <div class="qtext">${esc(q.q)}</div>
      <div class="qotd-done ${wasRight?"good":"bad"}">${wasRight?"✓ You got it — ":"Answer: "}<b>${esc(q.a)}</b>. ${wasRight?"+"+PTS_QOTD+" points banked.":"Come back tomorrow for a new one."}</div>
      <div class="score">Same question for everyone today · resets at midnight</div>`;
    return;
  }
  host.innerHTML=`<div class="qotd-head">🗓️ Question of the Day · ${q.cat}</div>
    <div class="qtext">${esc(q.q)}</div>
    ${q.opts.map((o,i)=>`<button class="opt" data-o="${esc(o)}" onclick="answerQOTD(this)">${esc(o)}</button>`).join("")}
    <div class="score">Answer once a day for +${PTS_QOTD} points${getPlayer()?"":" — set a name to bank it"}</div>`;
}
function answerQOTD(btn){
  const q=qotdPick(); const chosen=btn.dataset.o; const correct=(chosen===q.a);
  document.querySelectorAll("#qotd .opt").forEach(b=>{ b.disabled=true; if(b.dataset.o===q.a) b.classList.add("correct"); });
  if(!correct) btn.classList.add("wrong");
  const s=storeLoad(); s.qotd={date:dayStamp(),correct}; storeSave();
  if(correct) award({correct:1,answered:1,points:PTS_QOTD}); else award({answered:1});
  setTimeout(renderQOTD,1100);
}

/* ================= STATS + LEADERBOARD (per-device, localStorage) ================= */
const STORE_KEY = "knowhub_v1";
const PTS_CORRECT = 10, PTS_REVISE = 1;
let MEM = null;
function storeLoad(){
  if(MEM) return MEM;
  try{ MEM = JSON.parse(localStorage.getItem(STORE_KEY)); }catch(e){ MEM = null; }
  if(!MEM || typeof MEM!=="object") MEM = {player:"", months:{}};
  if(!MEM.months) MEM.months = {};
  return MEM;
}
function storeSave(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(MEM)); }catch(e){} }
function monthKey(d){ d=d||new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"); }
function monthLabel(k){ const p=k.split("-"); return new Date(+p[0],+p[1]-1,1).toLocaleDateString(undefined,{month:"long",year:"numeric"}); }
function getPlayer(){ return storeLoad().player || ""; }
function setPlayer(name){ const s=storeLoad(); s.player=(name||"").trim().slice(0,24); storeSave(); }
function row(mk,name){
  const s=storeLoad();
  if(!s.months[mk]) s.months[mk]={};
  if(!s.months[mk][name]) s.months[mk][name]={points:0,quizzes:0,correct:0,answered:0,revised:0,best:0};
  return s.months[mk][name];
}
function award(d){
  const name=getPlayer(); if(!name) return false;
  const r=row(monthKey(),name);
  for(const k in d){ if(k==="best") r.best=Math.max(r.best,d[k]); else r[k]=(r[k]||0)+d[k]; }
  storeSave(); refreshChips(); if(curPage==="board") renderBoard(); return true;
}
function myStats(){ const n=getPlayer(); if(!n) return null; return row(monthKey(),n); }

/* ================= REVISE / CRAM POOL ================= */
function catLabel(tag){ return {uae:"UAE",world:"World",tech:"Sci-Tech",econ:"Economy"}[tag]||tag; }
function buildRevisePool(){
  const pool=[];
  FLASHCARDS.forEach(([q,a])=>pool.push({q,a,cat:"GK"}));
  TICKER_FACTS.forEach(([k,v])=>pool.push({q:k+" — ?",a:v,cat:"GK"}));
  BRANDS.forEach(b=>pool.push({q:"Tagline of "+b.n+"?",a:"“"+b.t+"” — "+b.i,cat:"Brands"}));
  Object.values(NEWS_SEED).flat().forEach(n=>pool.push({q:n.h,a:n.p,cat:catLabel(n.tag)}));
  return pool;
}
const REVISE_POOL = buildRevisePool();
const REVISE_CATS = ["All",...Array.from(new Set(REVISE_POOL.map(x=>x.cat)))];
let cram = {list:[], i:0, revealed:false, cat:"All", auto:null, doneIds:new Set()};

function cramStart(catName){
  if(cram.auto){ clearInterval(cram.auto); cram.auto=null; }
  cram.cat = catName || cram.cat;
  cram.list = REVISE_POOL.filter(x=>cram.cat==="All"||x.cat===cram.cat).sort(()=>Math.random()-.5);
  cram.i=0; cram.revealed=false; cram.doneIds=new Set();
  renderCram();
}
function cramReveal(){
  if(cram.revealed) return;
  cram.revealed=true;
  const card=cram.list[cram.i];
  const id=cram.cat+"|"+card.q;
  if(!cram.doneIds.has(id)){ cram.doneIds.add(id); award({revised:1, points:PTS_REVISE}); }
  renderCram();
}
function cramNext(step){
  cram.i = (cram.i + (step||1) + cram.list.length) % cram.list.length;
  cram.revealed=false; renderCram();
}
function cramAuto(btn){
  if(cram.auto){ clearInterval(cram.auto); cram.auto=null; btn.textContent="▶ Auto-play"; return; }
  btn.textContent="⏸ Stop";
  cram.auto=setInterval(()=>{
    if(!cram.revealed) cramReveal();
    else cramNext(1);
  },2600);
}
function renderCram(){
  const stage=document.getElementById("cram-stage"); if(!stage) return;
  if(!cram.list.length){ stage.innerHTML='<p class="lede">No cards in this set.</p>'; return; }
  const c=cram.list[cram.i];

/* ================= QUIZ (taglines + GK) ================= */
function buildQuiz(){
  const qs=[];
  const shuffled=[...BRANDS].sort(()=>Math.random()-.5).slice(0,4);
  shuffled.forEach(b=>{
    const wrong=BRANDS.filter(x=>x.n!==b.n).sort(()=>Math.random()-.5).slice(0,3).map(x=>x.n);
    qs.push({q:`Which brand uses the tagline “${b.t}”?`,opts:[b.n,...wrong].sort(()=>Math.random()-.5),a:b.n});
  });
  // randomized general-knowledge questions from the bank
  const gkPick=[...GK_BANK].sort(()=>Math.random()-.5).slice(0,6).map(g=>({q:g.q,opts:[...g.opts].sort(()=>Math.random()-.5),a:g.a}));
  return [...qs,...gkPick].sort(()=>Math.random()-.5);
}
let QUIZ=[],qIdx=0,qScore=0;
function startQuiz(){ QUIZ=buildQuiz(); qIdx=0; qScore=0; renderQ(); }
function renderQ(){
  const box=document.getElementById("qzbox"); if(!box) return;
  if(qIdx>=QUIZ.length){
    award({quizzes:1, best:qScore});
    box.innerHTML=`<div class="qno">ROUND COMPLETE</div><div class="qtext">You scored ${qScore} / ${QUIZ.length} ${qScore>=QUIZ.length*0.7?"🏆 Quiz-team material!":"— run it again, repetition is recall."}</div>
      <div class="score">${getPlayer()?("Points added to "+esc(getPlayer())+"'s month total."):"Tip: set a name on the Leaderboard page to bank your points."}</div>
      <button class="btn" onclick="startQuiz()" style="margin-top:14px">Play again (new questions)</button>`;
    return;
  }
  const q=QUIZ[qIdx];
  box.innerHTML=`<div class="qno">QUESTION ${qIdx+1} / ${QUIZ.length}</div>
    <div class="qtext">${esc(q.q)}</div>
    ${q.opts.map((o,i)=>`<button class="opt" data-i="${i}" onclick="answer(this,${i})">${esc(o)}</button>`).join("")}
    <div class="score">Score: ${qScore}</div>`;
}
function answer(btn,i){
  const q=QUIZ[qIdx];
  const correctIdx=q.opts.indexOf(q.a);
  document.querySelectorAll(".qz .opt").forEach(b=>{ b.disabled=true; if(+b.dataset.i===correctIdx) b.classList.add("correct"); });
  if(i===correctIdx){ qScore++; award({correct:1,answered:1,points:PTS_CORRECT}); }
  else { btn.classList.add("wrong"); award({answered:1}); }
  setTimeout(()=>{qIdx++;renderQ();},900);
}

/* Each plan entry is a GNews request:
   {type:"search", q} OR {type:"top", category, country?} */
const GNEWS_PLAN = {
  daily:[
    {type:"search", q:'India (policy OR scheme OR "Supreme Court" OR Parliament OR bilateral OR summit OR governance)'},
    {type:"top", category:"world", country:"in"},
  ],
  uae:[
    {type:"top", country:"ae"},

  ],
  world:[
    {type:"top", category:"world"},
  ],
  tech:[
    {type:"search", q:'(ISRO OR NASA OR SpaceX OR "space mission" OR satellite OR rocket OR astronaut)'},
    {type:"search", q:'("new invention" OR breakthrough OR "new technology" OR "scientific discovery" OR "artificial intelligence" OR robotics)'},
  ],
  econ:[
    {type:"top", category:"business"},
    {type:"search", q:'(oil OR OPEC OR inflation OR RBI OR rupee OR "stock market" OR "interest rate")'},
  ],
};
function gnewsURL(spec){
  const base="https://gnews.io/api/v4/";
  if(spec.type==="top"){
    let u=`${base}top-headlines?category=${encodeURIComponent(spec.category||"general")}&lang=en&max=8`;
    if(spec.country) u+=`&country=${encodeURIComponent(spec.country)}`;
    return u+`&apikey=${GNEWS_KEY}`;
  }
  return `${base}search?q=${encodeURIComponent(spec.q)}&lang=en&max=8&sortby=publishedAt&apikey=${GNEWS_KEY}`;
}
async function gnewsFetchJSON(target){
  const tries=[];
  if(WORKER_URL) tries.push(WORKER_URL.replace(/\/+$/,"")+"?url="+encodeURIComponent(target)); // via your worker (no CORS)
  tries.push(target); // direct (works only if GNews allows CORS)
  let last;
  for(const u of tries){
    try{
      const r=await fetch(u);
      if(!r.ok){ last=new Error("HTTP "+r.status); continue; }
      const j=await r.json();
      if(j && Array.isArray(j.articles)) return j;
      if(j && j.errors) { last=new Error(j.errors.join("; ")); continue; }
      last=new Error("no articles");
    }catch(e){ last=new Error(e.message==="Failed to fetch"?"blocked (CORS/network)":e.message); }
  }
  throw last||new Error("GNews unreachable");
}
async function gnewsOne(spec){
  const j=await gnewsFetchJSON(gnewsURL(spec));
  return j.articles.map(a=>({title:a.title,description:a.description||a.content||"",link:a.url,pubDate:a.publishedAt,source:a.source&&a.source.name}));
}
function dedupeCards(cards){
  const seen=new Set(), out=[];
  for(const c of cards){ const k=(c.h||"").toLowerCase().slice(0,60); if(seen.has(k)) continue; seen.add(k); out.push(c); }
  return out;
}
async function fetchViaGNews(cat){
  const specs=GNEWS_PLAN[cat]||GNEWS_PLAN.daily;
  const per=specs.length>1?3:6;
  const res=await Promise.allSettled(specs.map(s=>gnewsOne(s)));
  let cards=[];
  res.forEach(r=>{ if(r.status==="fulfilled") r.value.slice(0,per).forEach(it=>cards.push(itemToCard(it,cat))); });
  cards=dedupeCards(cards);
  if(!cards.length){ const e=res.find(r=>r.status==="rejected"); throw new Error(e?e.reason.message:"GNews failed"); }
  return cards;
}
const GN=q=>`https://news.google.com/rss/search?q=${encodeURIComponent(q)}&hl=en-IN&gl=IN&ceid=IN:en`;
const WORLD_TOP="https://news.google.com/rss/headlines/section/topic/WORLD?hl=en-US&gl=US&ceid=US:en";
const RSS_FEEDS={
  daily:[GN('India (policy OR scheme OR Supreme Court OR Parliament OR bilateral OR summit) when:3d'), GN('"India UAE" OR Gulf when:5d')],
  uae:[GN('UAE OR Dubai OR "Abu Dhabi" OR Sharjah when:3d')],

  tech:[GN('ISRO OR NASA OR SpaceX OR satellite OR rocket OR "space mission" when:7d'), GN('invention OR breakthrough OR "new technology" OR "artificial intelligence" when:7d')],
  econ:[GN('oil OR OPEC OR RBI OR inflation OR "stock market" OR rupee when:7d')],
};
function parseXMLItems(xml){
  const doc=new DOMParser().parseFromString(xml,"text/xml");
  return [...doc.querySelectorAll("item")].map(it=>({
    title:it.querySelector("title")?.textContent||"",description:it.querySelector("description")?.textContent||"",
    link:it.querySelector("link")?.textContent||"",pubDate:it.querySelector("pubDate")?.textContent||"",
  })).filter(x=>x.title);
}
const STRATEGIES=[
  ...(WORKER_URL?[async url=>{ const r=await fetch(`${WORKER_URL}?url=${encodeURIComponent(url)}`); if(!r.ok) throw new Error("worker HTTP "+r.status); const j=await r.json(); const items=j.items||parseXMLItems(j.contents||""); if(!items.length) throw new Error("worker empty"); return items; }]:[]),
  async url=>{ const r=await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&count=10`); if(!r.ok) throw new Error("rss2json HTTP "+r.status); const j=await r.json(); if(j.status!=="ok"||!Array.isArray(j.items)||!j.items.length) throw new Error("rss2json no items"); return j.items; },
  async url=>{ const r=await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`); if(!r.ok) throw new Error("allorigins HTTP "+r.status); const j=await r.json(); const items=parseXMLItems(j.contents||""); if(!items.length) throw new Error("allorigins empty"); return items; },
  async url=>{ const r=await fetch(`https://corsproxy.io/?url=${encodeURIComponent(url)}`); if(!r.ok) throw new Error("corsproxy HTTP "+r.status); const items=parseXMLItems(await r.text()); if(!items.length) throw new Error("corsproxy empty"); return items; },
];
async function fetchRSS(url){ let last; for(const s of STRATEGIES){ try{ const it=await s(url); if(it.length) return it; }catch(e){ last=e; } } throw last||new Error("all strategies failed"); }
function upscTag(t){
  t=(t||"").toLowerCase();
  if(/isro|nasa|spacex|artificial intelligence|\bai\b|satellite|vaccine|quantum|robot|chip|semiconductor/.test(t)) return "GS-III: Science & Tech";
  if(/climate|cop\d|emission|environment|wildlife|flood|heatwave|biodiversity|monsoon/.test(t)) return "GS-III: Environment";
  if(/oil|opec|inflation|\brbi\b|imf|gdp|trade|market|economy|bank|tariff|tax|rupee|fdi/.test(t)) return "GS-III: Economy";
  if(/election|parliament|treaty|summit|united nations|\bun\b|minister|diplomat|sanction|border|ceasefire|bilateral|cepa/.test(t)) return "GS-II: Polity & IR";
  return "Prelims: current-affairs fact";
}
function fmtDate(d){ if(!d) return ""; const t=Date.parse(d); if(isNaN(t)) return String(d).slice(0,16); return new Date(t).toLocaleDateString(undefined,{day:"numeric",month:"short"}); }
function itemToCard(item,cat){
  const raw=(item.title||"Untitled").trim();
  const cut=raw.lastIndexOf(" - ");
  const h=(item.source?raw:(cut>0?raw.slice(0,cut):raw));
  const srcName=item.source||(cut>0?raw.slice(cut+3):"News");
  const url=item.link||"";
  const date=fmtDate(item.pubDate);
  let p=String(item.description||"").replace(/<[^>]*>/g," ").replace(/&nbsp;/g," ").replace(/&[a-z]+;/g," ").replace(/\s+/g," ").trim();
  if(!p||p.length<40||p.slice(0,30)===h.slice(0,30)) p="";
  if(p.length>230) p=p.slice(0,227)+"…";
  return {tag:cat,h,p,x:upscTag(raw+" "+p),s:"🔴 Live · "+srcName+(date?" · "+date:""),url};
}
async function fetchViaRSS(cat){
  const feeds=RSS_FEEDS[cat]; const per=feeds.length>1?3:6;
  const results=await Promise.allSettled(feeds.map(fetchRSS));
  let cards=[];
  results.forEach(r=>{ if(r.status==="fulfilled") r.value.slice(0,per).forEach(it=>cards.push(itemToCard(it,cat))); });
  cards=dedupeCards(cards);
  if(!cards.length) throw new Error("all feeds failed");
  return cards;
}

async function fetchViaClaude(cat){
  const prompt=`You are the current-affairs engine of a knowledge hub for UPSC aspirants, quizzers and MUN delegates.
Search the web for the 5 most important CURRENT news items in: ${SOURCE_HINTS[cat]}
Summarize in your own words. Respond with ONLY a JSON array, no fences. Each item:
{"h":"headline (max 10 words)","p":"2-3 line summary","w":"why it matters / likely question angle","x":"UPSC exam angle","s":"source + month/year"}`;
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}],tools:[{type:"web_search_20250305",name:"web_search"}]})});

async function fetchViaCA(cat,sources){
  if(!WORKER_URL) throw new Error("no worker deployed");
  const q=sources?("?sources="+encodeURIComponent(sources)):"?";
  const r=await fetch(WORKER_URL.replace(/\/+$/,"")+"/ca"+q+"&_="+Date.now(),{cache:"no-store"});
  if(!r.ok) throw new Error("CA HTTP "+r.status);
  const j=await r.json();
  if(!Array.isArray(j.items)||!j.items.length) throw new Error("no items returned");

async function fetchLive(cat,btn){
  const status=document.getElementById("status-"+cat), spin=document.getElementById("spin-"+cat), wrap=document.getElementById("live-"+cat);
  btn.disabled=true; spin.style.display="inline-block"; status.textContent="Pulling live headlines…";

}

  const medals=["🥇","🥈","🥉"];
  let body = rows.length ? rows.map((r,i)=>`<tr class="${r.name===me?"me":""}">
      <td class="rk">${i<3?`<span class="medal">${medals[i]}</span>`:("#"+(i+1))}</td>
      <td class="nm">${esc(r.name)}</td><td>${r.points}</td><td>${r.correct}/${r.answered}</td>
      <td>${r.acc}%</td><td>${r.revised}</td><td>${r.quizzes}</td></tr>`).join("")
    : `<tr><td colspan="7" style="color:var(--muted);padding:20px">No scores yet this month. Take a quiz or run a cram session to get on the board.</td></tr>`;
  host.innerHTML=`
    <div class="sorttabs">${tabs.map(([k,l])=>`<button class="filterbtn ${boardSort===k?"active":""}" onclick="boardSort='${k}';renderBoard()">${l}</button>`).join("")} <span style="margin-left:auto">${monthSel}</span></div>
    <table class="board"><thead><tr><th>Rank</th><th>Name</th><th>Points</th><th>Correct</th><th>Acc.</th><th>Revised</th><th>Quizzes</th></tr></thead><tbody>${body}</tbody></table>
    <div class="note" style="margin-top:16px">🏆 Scoring: +${PTS_CORRECT} points per correct quiz answer · +${PTS_REVISE} per card revised. Scores are saved in this browser (per-device). ${rows.length?`<a href="#" onclick="resetMine();return false;">Reset my stats</a>`:""}</div>`;
}
function resetMine(){
  const me=getPlayer(); if(!me) return;
  if(!confirm("Reset "+me+"'s stats for "+monthLabel(boardMonth)+"?")) return;
  const s=storeLoad(); if(s.months[boardMonth]) delete s.months[boardMonth][me]; storeSave(); refreshChips(); renderBoard();
}

      <button class="btn ghost" id="autobtn" onclick="cramAuto(this)" style="margin-left:auto">▶ Auto-play</button></div>

  board:()=>`
    <div class="eyebrow">Monthly Standings</div><h1>Leaderboard</h1>

    <div id="boardhost"></div>`,
  uae:()=>newsPage("uae","UAE Current Affairs","From federation facts to COP28 and the Hope Probe — everything UAE a quizzer needs, in cards."),
  daily:()=>`
    <div class="eyebrow">For Civil Services Aspirants</div><h1>UPSC Daily Brief</h1>

    ${fetchBar("daily")}
    <h2>How news maps to the UPSC syllabus</h2>
    <div class="grid cols-4">
      <article class="card b-quiz"><span class="tag t-quiz">GS-I</span><h3>History · Geography · Society</h3><p>Heritage news, demographic reports, urbanisation, monsoon & disaster geography.</p></article>
      <article class="card b-world"><span class="tag t-world">GS-II</span><h3>Polity · Governance · IR</h3><p>Constitutional issues, govt schemes, India–UAE/Gulf ties, UN resolutions, summits & treaties.</p></article>
      <article class="card b-econ"><span class="tag t-econ">GS-III</span><h3>Economy · Sci-Tech · Environment</h3><p>RBI policy, oil & trade, ISRO missions, AI regulation, COP outcomes, internal security.</p></article>
      <article class="card b-tech"><span class="tag t-tech">GS-IV + Prelims</span><h3>Ethics & Fact Bank</h3><p>Case-study material from governance news; one-line facts for Prelims recall.</p></article>

    <h2>Why UAE news matters for UPSC</h2>
    <ul class="tips">
      <li><b>CEPA (2022):</b> India–UAE Comprehensive Economic Partnership Agreement — India's first CEPA in the region.</li>

      <li><b>Diaspora:</b> ~3.5 million Indians in the UAE — remittances, labour reforms and consular issues are standard Mains fodder.</li>
      <li><b>I2U2 & West Asia:</b> the India–Israel–UAE–USA grouping and UAE's BRICS entry are favourite Prelims questions.</li>
      <li><b>Climate diplomacy:</b> COP28's 'UAE Consensus' on transitioning from fossil fuels is quotable in any environment answer.</li>

  world:()=>newsPage("world","World Current Affairs","Geopolitics decoded: the UN system, global groupings and the frameworks behind the headlines."),
  tech:()=>newsPage("tech","Science & Technology","AI, space missions, medicine, robotics and energy — the fastest-moving quiz category."),
  econ:()=>newsPage("econ","Economy & Business","Oil, markets, institutions and Big Tech — the mechanics behind every business headline."),
  countries:()=>`
    <div class="eyebrow">World Atlas</div><h1>Country Information</h1>
    <p class="lede">Identity cards for every nation — capital, population, language, currency and one quiz-worthy fact. Use the AI lookup for any country not listed.</p>
    <div class="searchrow"><input id="country-q" placeholder="Type any country… e.g. Indonesia" onkeydown="if(event.key==='Enter')lookupCountry()"><button class="btn" onclick="lookupCountry()">AI lookup</button></div>

    <div class="eyebrow">Brand Bank</div><h1>Companies, Logos & Taglines</h1>
    <p class="lede">The most-asked branding questions in school quizzes: who says what, founded when, and by whom.</p>
    <div class="note">ℹ️ Logos are shown as colour monograms (real logos are trademarked artwork). The brand colour + initial is itself a great memory hook for quizzes.</div>

    <h2>🏛️ MUN skill drill</h2><ul class="tips">${MUN_TIPS.map(t=>`<li>${t}</li>`).join("")}</ul>`,
  sources:()=>`

    <h2>🌍 International & Science</h2><div class="srcgrid">${[["United Nations","Official reports & frameworks"],["NASA","Mission updates"],["SpaceX","Launch & Starship updates"],["MIT Technology Review","AI & deep-tech insight"]].map(x=>`<div class="card b-tech"><h3>${x[0]}</h3><p>${x[1]}</p></div>`).join("")}</div>
    <h2>🧠 How sources are used</h2>
    <ul class="tips"><li><b>Summarized, not copied</b> — every card is rewritten in plain student language.</li><li><b>Simplified for learning</b> — 2–4 line limits force clarity.</li><li><b>Categorized</b> — every item lands in one learning section with a colour tag.</li><li><b>Live mode</b> — fetch buttons pull fresh headlines, UAE prioritised, with exam tags.</li></ul>`,
};

/* ================= NAV / BOOT ================= */
const NAV=[["home","Home"],["daily","UPSC Daily"],["revise","Revise"],["board","Leaderboard"],["uae","UAE"],["world","World"],["tech","Sci-Tech"],["econ","Economy"],["countries","Countries"],["brands","Brands"],["quiz","Quiz & MUN"],["sources","Sources"]];
let curPage="home";
function renderQOTDHome(){
  const host=document.getElementById("qotd-home"); if(!host) return;
  const q=qotdPick();
  host.innerHTML=`<div class="q"><div class="lbl">🗓️ Question of the Day</div><div class="txt">${esc(q.q)}</div></div>
    <button class="btn" onclick="go('quiz')">${qotdDone()?"View answer →":"Answer it →"}</button>`;
}
function go(id){
  curPage=id;
  document.querySelectorAll(".page").forEach(p=>p.classList.toggle("active",p.id==="pg-"+id));
  document.querySelectorAll(".nav button").forEach(b=>b.classList.toggle("active",b.dataset.id===id));
  if(cram.auto){ clearInterval(cram.auto); cram.auto=null; }
  if(id==="home") renderQOTDHome();
  if(id==="quiz"){ startQuiz(); renderQOTD(); }
  if(id==="revise") cramStart(cram.cat);
  if(id==="board") renderBoard();
  window.scrollTo({top:0});
}
(function boot(){
  const nav=document.getElementById("nav");
  NAV.forEach(([id,label])=>{ const b=document.createElement("button"); b.textContent=label; b.dataset.id=id; b.onclick=()=>go(id); nav.appendChild(b); });
  const main=document.getElementById("pages");
  NAV.forEach(([id])=>{ const s=document.createElement("section"); s.className="page"; s.id="pg-"+id; s.innerHTML=PAGES[id](); main.appendChild(s); });
  const t=document.getElementById("ticker");
  const items=TICKER_FACTS.map(([k,v])=>`&nbsp;&nbsp;◆&nbsp;&nbsp;<b>${k}</b> ${v}`).join("");
  t.innerHTML=items+items;
  go("home");
})();
</script>
